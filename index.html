<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webtry</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block;max-width:100vw;max-height:100vh;width:auto;height:auto;object-fit:contain;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script type="module">
import PartySocket from 'https://esm.sh/partysocket';

const PARTYKIT_HOST = location.hostname === 'localhost'
  ? 'localhost:1999' : 'webtry.ilmeri.partykit.dev'; // update after first deploy

const cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
const W = 1920, H = 1080;
cvs.width = W; cvs.height = H;

// ===== Physics (simple arcade flight model — mirrors server) =====
const GRAVITY        = 250;    // px/s² (lower = more consistent loops)
const THRUST         = 500;    // px/s² forward along plane direction
const LIFT           = 700;    // px/s² in plane's up direction (gentler climb)
const PITCH_UP_RATE  = 2.5;    // rad/s — loop radius ≈ speed/rate ≈ 160px ≈ 5× plane length
const NOSE_FALL_RATE = 1.5;    // rad/s nose-fall rate without throttle (snappy response)
const GLIDE_ANGLE    = 0.3;    // rad (~17°) max nose-down angle at full airspeed
const MAX_SPEED      = 400;    // px/s (slower, more controllable)
const DRAG           = 0.15;   // linear drag coefficient (higher = quicker decel, more control)
const BULLET_SPEED   = 600;    // px/s
const CRASH_SPEED    = 130;    // px/s downward vy to crash on ground contact
const MIN_FLY_SPEED  = 150;    // px/s forward speed needed before pitch-up and lift kick in
const GROUND_Y = H - 40;
const CEILING = 20;

function deltaAngle(a, b) {
  let d = b - a;
  while (d > Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return d;
}

// ===== Game State =====
let gameState = 'MENU'; // MENU, PLAYING
let myIdx = -1;
let ws = null;
let players = []; // { idx, x, y, vx, vy, angle, flipped, throttle, alive, occupied }
let bullets = []; // { x, y, vx, vy, owner }
let myName = localStorage.getItem('webtry-name') || '';
let myThrottle = false;

// Prediction smoothing
const smoothOffsets = {}; // idx -> { x, y }
const SMOOTH_DECAY = 0.7;

// ===== Canvas Coord =====
function canvasPos(e) {
  const r = cvs.getBoundingClientRect();
  const t = e.touches ? e.touches[0] || e.changedTouches[0] : e;
  return {
    x: (t.clientX - r.left) / r.width * W,
    y: (t.clientY - r.top) / r.height * H
  };
}

// ===== Camera =====
let camX = 0;

function updateCamera() {
  const me = players.find(p => p.idx === myIdx);
  if (me) {
    const targetX = me.x - W * 0.3;
    camX += (targetX - camX) * 0.08;
  }
}

// ===== Drawing =====
function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#4a90d9');
  grad.addColorStop(0.7, '#87ceeb');
  grad.addColorStop(1, '#5a8f3c');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Clouds (parallax, slower than ground)
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  const cloudOff = camX * 0.3;
  for (let i = -1; i < 8; i++) {
    const cx = i * 350 - (cloudOff % 350);
    ctx.beginPath();
    ctx.ellipse(cx, 120, 80, 30, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 200, 200, 60, 22, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Ground
  ctx.fillStyle = '#3d6b2e';
  ctx.fillRect(0, H - 40, W, 40);

  // Ground stripes (scroll with camera for movement reference)
  ctx.fillStyle = '#4a7a3a';
  const stripeSpacing = 120;
  const groundOff = camX % stripeSpacing;
  for (let i = -1; i < W / stripeSpacing + 2; i++) {
    const sx = i * stripeSpacing - groundOff;
    ctx.fillRect(sx, H - 40, 4, 40);
  }

  // Trees (scroll with camera)
  ctx.fillStyle = '#2d5a1e';
  const treeSpacing = 200;
  const treeOff = camX % treeSpacing;
  for (let i = -1; i < W / treeSpacing + 2; i++) {
    const tx = i * treeSpacing - treeOff + 50;
    // Trunk
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(tx - 3, H - 60, 6, 20);
    // Canopy
    ctx.fillStyle = '#2d5a1e';
    ctx.beginPath();
    ctx.moveTo(tx, H - 80);
    ctx.lineTo(tx - 15, H - 55);
    ctx.lineTo(tx + 15, H - 55);
    ctx.closePath();
    ctx.fill();
  }
}

function drawPlane(p) {
  const sx = p.x - camX;
  const sy = p.y;
  if (sx < -60 || sx > W + 60) return;

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(p.angle);
  // When flipped, mirror vertically (along the forward axis)
  if (p.flipped) ctx.scale(1, -1);

  // Fuselage
  ctx.fillStyle = p.alive ? (p.idx === myIdx ? '#e8c840' : '#e04545') : '#666';
  ctx.beginPath();
  ctx.moveTo(20, 0);
  ctx.lineTo(-12, -6);
  ctx.lineTo(-12, 6);
  ctx.closePath();
  ctx.fill();

  // Wing
  ctx.fillStyle = p.alive ? (p.idx === myIdx ? '#d4a800' : '#c43030') : '#555';
  ctx.fillRect(-6, -10, 10, 20);

  // Tail
  ctx.fillRect(-14, -5, 4, 10);

  // Throttle flame
  if (p.throttle && p.alive) {
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.moveTo(-12, -3);
    ctx.lineTo(-20 - Math.random() * 6, 0);
    ctx.lineTo(-12, 3);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();

  // Name label
  if (p.name) {
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(p.name, sx, sy - 22);
  }
}

function drawBullets() {
  ctx.fillStyle = '#ff0';
  for (const b of bullets) {
    const sx = b.x - camX;
    if (sx < -10 || sx > W + 10) continue;
    ctx.beginPath();
    ctx.arc(sx, b.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHUD() {
  ctx.font = '14px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.textAlign = 'left';
  ctx.fillText('LMB: throttle  |  MMB: flip  |  RMB: shoot  |  Space: respawn', 10, H - 10);
}

function drawMenu() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 64px sans-serif';
  ctx.fillStyle = '#e8c840';
  ctx.fillText('WEBTRY', W / 2, H / 2 - 80);
  ctx.font = '24px sans-serif';
  ctx.fillStyle = '#ccc';
  ctx.fillText('Click to play', W / 2, H / 2 + 20);
}

// ===== Rendering =====
function render() {
  if (gameState === 'MENU') {
    drawMenu();
    return;
  }

  drawBackground();
  updateCamera();
  drawBullets();
  for (const p of players) drawPlane(p);
  drawHUD();
}

// ===== Client Prediction =====
const FDT = 1 / 60;

function fixedUpdate() {
  if (gameState !== 'PLAYING') return;

  const me = players.find(p => p.idx === myIdx);
  if (me && me.alive && me.occupied) {
    const vertSign = me.flipped ? -1 : 1;
    const onGround = me.y >= GROUND_Y;
    const fwdX = Math.cos(me.angle);
    const fwdY = Math.sin(me.angle);
    const forwardSpeed = me.vx * fwdX + me.vy * fwdY;
    const flyFactor = Math.min(forwardSpeed / MIN_FLY_SPEED, 1);

    // --- Angle (direct control, no angular velocity) ---
    if (me.throttle && flyFactor >= 1) {
      me.angle -= PITCH_UP_RATE * vertSign * FDT;
    } else if (!onGround && !me.throttle) {
      const speed = Math.sqrt(me.vx * me.vx + me.vy * me.vy);
      const speedFactor = Math.min(speed / (MAX_SPEED * 0.5), 1);
      const target = GLIDE_ANGLE + (Math.PI / 2 - GLIDE_ANGLE) * (1 - speedFactor);
      const diff = deltaAngle(me.angle, target);
      const step = NOSE_FALL_RATE * FDT;
      if (Math.abs(diff) <= step) {
        me.angle = target;
      } else {
        me.angle += Math.sign(diff) * step;
      }
    }
    while (me.angle > Math.PI) me.angle -= Math.PI * 2;
    while (me.angle < -Math.PI) me.angle += Math.PI * 2;

    // --- Forces ---
    if (me.throttle) {
      me.vx += fwdX * THRUST * FDT;
      me.vy += fwdY * THRUST * FDT;

      // Lift only when airborne
      if (!onGround && flyFactor > 0) {
        const upX = Math.sin(me.angle) * vertSign;
        const upY = -Math.cos(me.angle) * vertSign;
        const liftScale = Math.max(0, -upY);
        me.vx += upX * LIFT * liftScale * flyFactor * FDT;
        me.vy += upY * LIFT * liftScale * flyFactor * FDT;
      }
    }

    if (!onGround) {
      me.vy += GRAVITY * FDT;
    }

    const dragFactor = 1 / (1 + DRAG * FDT);
    me.vx *= dragFactor;
    me.vy *= dragFactor;

    const spd = Math.sqrt(me.vx * me.vx + me.vy * me.vy);
    if (spd > MAX_SPEED) { me.vx *= MAX_SPEED / spd; me.vy *= MAX_SPEED / spd; }

    // Move
    me.x += me.vx * FDT;
    me.y += me.vy * FDT;

    // Ground
    if (me.y >= GROUND_Y) {
      me.y = GROUND_Y;
      if (me.vy > CRASH_SPEED) {
        me.alive = false;
      } else if (me.vy > 0) {
        me.vy = 0;
        me.vx *= 0.95;
      }
    }

    // Ceiling
    if (me.y < CEILING) { me.y = CEILING; if (me.vy < 0) me.vy = 0; }
  }

  // Predict bullets
  for (const b of bullets) {
    b.x += b.vx * FDT; b.y += b.vy * FDT;
  }

  // Decay smoothing offsets
  for (const idx in smoothOffsets) {
    smoothOffsets[idx].x *= SMOOTH_DECAY;
    smoothOffsets[idx].y *= SMOOTH_DECAY;
    if (Math.abs(smoothOffsets[idx].x) < 0.1) smoothOffsets[idx].x = 0;
    if (Math.abs(smoothOffsets[idx].y) < 0.1) smoothOffsets[idx].y = 0;
  }
}

// ===== State Unpack =====
function unpackState(data) {
  // Update/add players from server
  for (const sp of data.players) {
    let p = players.find(pp => pp.idx === sp.i);
    if (!p) {
      p = { idx: sp.i, x: sp.x, y: sp.y, vx: sp.vx, vy: sp.vy,
            angle: sp.a, flipped: !!sp.fl,
            throttle: sp.t, alive: sp.alive, occupied: sp.occ, name: '' };
      players.push(p);
    }

    if (sp.i === myIdx) {
      // Own player: smoothing offset
      if (!smoothOffsets[sp.i]) smoothOffsets[sp.i] = { x: 0, y: 0 };
      smoothOffsets[sp.i].x += p.x - sp.x;
      smoothOffsets[sp.i].y += p.y - sp.y;
      p.x = sp.x; p.y = sp.y; p.vx = sp.vx; p.vy = sp.vy;
      p.angle = sp.a;
      p.flipped = !!sp.fl;
      // Client authoritative for throttle; accept alive from server
      p.alive = sp.alive;
    } else {
      // Remote: snap
      p.x = sp.x; p.y = sp.y; p.vx = sp.vx; p.vy = sp.vy;
      p.angle = sp.a; p.flipped = !!sp.fl;
      p.throttle = sp.t; p.alive = sp.alive; p.occupied = sp.occ;
    }
  }

  // Remove players no longer in server state
  const serverIdxs = new Set(data.players.map(p => p.i));
  players = players.filter(p => serverIdxs.has(p.idx));

  // Bullets: replace with server state
  bullets = data.bullets.map(b => ({ x: b.x, y: b.y, vx: b.vx, vy: b.vy, owner: b.o }));
}

// ===== Networking =====
let pendingState = null;

function joinGame() {
  ws = new PartySocket({ host: PARTYKIT_HOST, room: 'arena' });

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'assign':
        myIdx = msg.idx;
        gameState = 'PLAYING';
        if (myName) ws.send(JSON.stringify({ type: 'name', name: myName }));
        break;
      case 'state':
        pendingState = msg.data;
        break;
      case 'start':
        gameState = 'PLAYING';
        break;
      case 'joined':
      case 'left':
      case 'players':
        // Update names from player list
        if (msg.players) {
          for (const pl of msg.players) {
            const p = players.find(pp => pp.idx === pl.idx);
            if (p) p.name = pl.name;
          }
        }
        break;
      case 'full':
        alert('Server full');
        break;
    }
  };

  ws.onclose = () => {
    gameState = 'MENU';
    myIdx = -1;
    players = [];
    bullets = [];
  };
}

// ===== Input =====
cvs.addEventListener('contextmenu', e => e.preventDefault());

cvs.addEventListener('mousedown', e => {
  if (gameState === 'MENU') { joinGame(); return; }
  if (gameState !== 'PLAYING') return;

  if (e.button === 0) {
    // Left click: throttle on
    myThrottle = true;
    const me = players.find(p => p.idx === myIdx);
    if (me) me.throttle = true;
    if (ws) ws.send(JSON.stringify({ type: 'input', action: 'throttle', active: true }));
  } else if (e.button === 1) {
    // Middle click: flip (toggle flipped flag, not angle rotation)
    e.preventDefault();
    const me = players.find(p => p.idx === myIdx);
    if (me && me.alive) {
      me.flipped = !me.flipped;
    }
    if (ws) ws.send(JSON.stringify({ type: 'input', action: 'flip' }));
  } else if (e.button === 2) {
    // Right click: shoot
    if (ws) ws.send(JSON.stringify({ type: 'input', action: 'shoot' }));
    // Local prediction bullet
    const me = players.find(p => p.idx === myIdx);
    if (me && me.alive) {
      bullets.push({ x: me.x, y: me.y, vx: Math.cos(me.angle) * BULLET_SPEED, vy: Math.sin(me.angle) * BULLET_SPEED, owner: myIdx });
    }
  }
});

cvs.addEventListener('mouseup', e => {
  if (e.button === 0 && gameState === 'PLAYING') {
    myThrottle = false;
    const me = players.find(p => p.idx === myIdx);
    if (me) me.throttle = false;
    if (ws) ws.send(JSON.stringify({ type: 'input', action: 'throttle', active: false }));
  }
});

// Catch mouseup outside canvas
document.addEventListener('mouseup', e => {
  if (e.target === cvs) return;
  if (e.button === 0 && gameState === 'PLAYING' && myThrottle) {
    myThrottle = false;
    const me = players.find(p => p.idx === myIdx);
    if (me) me.throttle = false;
    if (ws) ws.send(JSON.stringify({ type: 'input', action: 'throttle', active: false }));
  }
});

// Respawn on Space
window.addEventListener('keydown', e => {
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    if (ws) ws.send(JSON.stringify({ type: 'respawn' }));
  }
});

// Clear throttle on blur
window.addEventListener('blur', () => {
  if (myThrottle && ws) {
    myThrottle = false;
    const me = players.find(p => p.idx === myIdx);
    if (me) me.throttle = false;
    ws.send(JSON.stringify({ type: 'input', action: 'throttle', active: false }));
  }
});

// ===== Game Loop =====
let acc = 0, lt = 0;

function loop(time) {
  if (lt === 0) { lt = time; requestAnimationFrame(loop); return; }
  let dt = (time - lt) / 1000; lt = time;
  dt = Math.min(dt, 0.1);

  // Apply server state
  if (pendingState) {
    try { unpackState(pendingState); } catch (e) { console.warn('unpack error:', e); }
    pendingState = null;
  }

  acc += dt;
  while (acc >= FDT) { fixedUpdate(); acc -= FDT; }

  render();
  requestAnimationFrame(loop);
}

// ===== Responsive =====
function resize() {
  const s = Math.min(innerWidth / W, innerHeight / H);
  cvs.style.width = W * s + 'px';
  cvs.style.height = H * s + 'px';
}
addEventListener('resize', resize);
resize();

requestAnimationFrame(loop);
</script>
</body>
</html>
